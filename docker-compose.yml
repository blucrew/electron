services:
  electron:
    build: .
    container_name: electron
    entrypoint: ["node", "index.js"]
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - electron-data:/app/data
      - ./config.js:/app/config.js:ro
      - ./session_files:/app/session_files:ro
      - ./public:/app/public:ro
      - ./views:/app/views:ro
    restart: unless-stopped
    networks:
      - electron

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - electron
    restart: unless-stopped
    networks:
      - electron

networks:
  electron:
    driver: bridge

volumes:
  electron-data:
